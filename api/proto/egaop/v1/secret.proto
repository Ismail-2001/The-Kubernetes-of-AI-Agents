syntax = "proto3";

package egaop.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/egaop/egaop/api/generated/go/egaop/v1";

// Secret Store Service
service SecretService {
  rpc GetSecret (GetSecretRequest) returns (Secret);
  rpc CreateSecret (CreateSecretRequest) returns (Secret);
}

message GetSecretRequest {
  string name = 1;
  string namespace = 2;
  string agent_id = 3; // For scoped access checks
}

message CreateSecretRequest {
  string name = 1;
  string namespace = 2;
  map<string, string> data = 3; // Raw secret data (encrypted at rest)
  string type = 4; // environment_variable, api_key, iam_token
}

// Secret resource definition
message Secret {
  string api_version = 1;
  string kind = 2;
  Metadata metadata = 3;
  SecretSpec spec = 4;
}

message Metadata {
  string name = 1;
  string namespace = 2;
  google.protobuf.Timestamp created_at = 3;
}

message SecretSpec {
  string type = 1;
  map<string, string> data = 2; // Usually returned as redacted or dynamic reference
  SecretRotation rotation = 3;
}

message SecretRotation {
  bool enabled = 1;
  string interval = 2; // e.g. 24h
  string strategy = 3; // e.g. vault-dynamic
}
