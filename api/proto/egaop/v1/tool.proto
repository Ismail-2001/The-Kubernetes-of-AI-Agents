syntax = "proto3";

package egaop.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/egaop/egaop/api/generated/go/egaop/v1";

// Tool resource definition
message Tool {
  string api_version = 1;
  string kind = 2;
  ToolMetadata metadata = 3;
  ToolSpec spec = 4;
}

message ToolMetadata {
  string name = 1;
  string namespace = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
}

message ToolSpec {
  string version = 1;
  string description = 2;
  string category = 3;
  string data_classification = 4;
  EndpointConfig endpoint = 5;
  google.protobuf.Struct input_schema = 6;
  google.protobuf.Struct output_schema = 7;
  string cost_per_call = 8;
  bool side_effects = 9;
  string idempotency_key = 10;
  bool retryable = 11;
  string timeout = 12;
}

message EndpointConfig {
  string type = 1;
  string method = 2;
  string url = 3;
  AuthenticationConfig authentication = 4;
}

message AuthenticationConfig {
  string type = 1;
  string secret_ref = 2;
}

// Tool Proxy Service
service ToolService {
  rpc CallTool (ToolCallRequest) returns (ToolCallResponse);
}

message ToolCallRequest {
  string agent_id = 1;
  string execution_id = 2;
  string tool_name = 3;
  string version = 4;
  google.protobuf.Struct args = 5;
}

message ToolCallResponse {
  google.protobuf.Struct result = 1;
  string status = 2; // succeeded, failed
  string error_message = 3;
  double latency_ms = 4;
  string cost = 5;
}
