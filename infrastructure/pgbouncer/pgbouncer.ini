[databases]
egaop = host=postgres port=5432 dbname=egaop
temporal = host=postgres port=5432 dbname=temporal
temporal_visibility = host=postgres port=5432 dbname=temporal_visibility

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool configuration
pool_mode = transaction
default_pool_size = 25
max_client_conn = 100
max_db_connections = 50
reserve_pool_size = 5
reserve_pool_timeout = 3

# Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 10
idle_transaction_timeout = 60

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
verbose = 0

# Tuning
pkt_buf = 4096
listen_backlog = 256
sbuf_loopcnt = 5
max_packet_size = 4194304
