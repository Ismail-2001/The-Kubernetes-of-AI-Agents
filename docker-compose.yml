# =============================================================================
# E-GAOP Docker Compose — All 8 services + infrastructure
# =============================================================================
# Usage:
#   docker compose up -d                     # Start all services
#   docker compose up -d --build <service>   # Rebuild a single service
#   docker compose logs -f <service>         # Tail logs
#   docker compose down -v                   # Stop and remove volumes
#
# Prerequisites:
#   - Docker Engine 24+ with Compose v2
#   - Copy .env.example to .env and fill in secrets (OPENAI_API_KEY, etc.)
#   - Docker socket available for sandbox-runtime
# =============================================================================

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - egaop-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-egaop}
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER:-egaop} -d ${POSTGRES_DB:-egaop} -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - egaop-net
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_SEEDS: postgres
      TEMPORAL_LOG_LEVEL: "warn"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>&1 | grep -q SERVING || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - egaop-net
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest
    volumes:
      - ./policy-plane/policies:/policies:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    networks:
      - egaop-net
    restart: unless-stopped

  # ─── Observability Infrastructure ─────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # zpages
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # health check
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - egaop-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - egaop-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/e-gaop-dashboard.json:/var/lib/grafana/dashboards/e-gaop.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - egaop-net
    restart: unless-stopped

  # ─── Control Plane ────────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: control-plane/api-server/Dockerfile
    ports:
      - "50051:50051"
      - "3001:3001"
      - "15051:15051"
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      API_SERVER_GRPC_PORT: "50051"
      API_SERVER_HEALTH_PORT: "15051"
      API_SERVER_REST_PORT: "3001"
      REDIS_URL: redis://redis:6379
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_DB: ${POSTGRES_DB:-egaop}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-api-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:15051/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  secret-store:
    build:
      context: .
      dockerfile: control-plane/secret-store/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      SECRET_STORE_PORT: "50057"
      SECRET_STORE_HEALTH_PORT: "15057"
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-egaop}
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-secret-store
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  workflow-engine:
    build:
      context: .
      dockerfile: control-plane/workflow-engine/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: "7233"
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-egaop}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-egaop-agent-queue}
      API_SERVER_ADDR: api-server:50051
      SANDBOX_RUNTIME_ADDR: sandbox-runtime:50054
      OBSERVABILITY_PLANE_ADDR: observability-plane:50056
      LLM_ROUTER_ADDR: llm-router:50053
      MEMORY_PLANE_ADDR: memory-plane:50055
      TOOL_PROXY_ADDR: tool-proxy:50052
      POLICY_PLANE_ADDR: http://opa:8181
      WORKFLOW_ENGINE_HEALTH_PORT: "15058"
      REDIS_URL: redis://redis:6379
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-workflow-engine
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      temporal:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  # ─── Execution Plane ──────────────────────────────────────────────────────
  llm-router:
    build:
      context: .
      dockerfile: execution-plane/llm-router/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      RATE_LIMIT_RPM: ${RATE_LIMIT_LLM_RPM:-30}
      LLM_ROUTER_PORT: "50053"
      LLM_ROUTER_HEALTH_PORT: "15053"
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-gpt-4o,gpt-4o-mini,gpt-3.5-turbo}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-llm-router
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  tool-proxy:
    build:
      context: .
      dockerfile: execution-plane/tool-proxy/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      RATE_LIMIT_RPM: ${RATE_LIMIT_TOOL_PROXY_RPM:-60}
      TOOL_PROXY_PORT: "50052"
      TOOL_PROXY_HEALTH_PORT: "15052"
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-tool-proxy
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  # Docker socket proxy — exposes a filtered Docker API to sandbox-runtime
  # without requiring root or direct socket access.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      POST: "1"
      CONTAINERS: "1"
      EXEC: "1"
      IMAGES: "1"
      ALLOW_START: "1"
      ALLOW_STOP: "1"
      NETWORKS: "0"
      VOLUMES: "0"
      LOG_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - egaop-net
    restart: unless-stopped

  base-runtime:
    image: egaop-base-runtime:latest
    build:
      context: execution-plane/sandbox-runtime/base-runtime
    restart: "no"

  sandbox-runtime:
    build:
      context: .
      dockerfile: execution-plane/sandbox-runtime/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      SANDBOX_RUNTIME_PORT: "50054"
      SANDBOX_RUNTIME_HEALTH_PORT: "15054"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-sandbox-runtime
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:15054/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      docker-socket-proxy:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  # ─── Data / Observability Planes ──────────────────────────────────────────
  memory-plane:
    build:
      context: .
      dockerfile: memory-plane/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      MEMORY_PLANE_PORT: "50055"
      MEMORY_PLANE_HEALTH_PORT: "15055"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-egaop}
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-memory-plane
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  observability-plane:
    build:
      context: .
      dockerfile: observability-plane/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      OBSERVABILITY_PLANE_PORT: "50056"
      OBSERVABILITY_PLANE_HEALTH_PORT: "15056"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-observability-plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-egaop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-egaop}
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ./api/proto:/api/proto:ro
      - ./certs:/etc/egaop/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

  # ─── Admin Console ───────────────────────────────────────────────────────
  admin-console:
    build:
      context: ./admin-console
    ports:
      - "${ADMIN_CONSOLE_PORT:-3002}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://api-server:50051
      NEXT_PUBLIC_SSE_URL: http://api-server:3001
      API_SERVER_REST_URL: http://api-server:3001
      API_SERVER_HEALTH_URL: http://api-server:15051
      EGAOP_MASTER_ENCRYPTION_KEY: ${EGAOP_MASTER_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: egaop-admin-console
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api-server:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - egaop-net
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  egaop-net:
    driver: bridge
