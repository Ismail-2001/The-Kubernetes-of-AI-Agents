# docker-compose.secrets.yml — Docker Compose override for secrets management
# Usage: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# This override mounts secrets as files at /run/secrets/<name> inside containers.
# Services read from /run/secrets/ when available, falling back to env vars.

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  egaop_master_encryption_key:
    file: ./secrets/egaop_master_encryption_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  internal_service_token:
    file: ./secrets/internal_service_token.txt

services:
  api-server:
    secrets:
      - jwt_secret
      - egaop_master_encryption_key
      - postgres_password
      - openai_api_key
      - internal_service_token
    environment:
      # Override env vars to empty so code reads from /run/secrets/
      JWT_SECRET: ""
      EGAOP_MASTER_ENCRYPTION_KEY: ""
      POSTGRES_PASSWORD: ""
      OPENAI_API_KEY: ""
      INTERNAL_SERVICE_TOKEN: ""

  llm-router:
    secrets:
      - openai_api_key
      - internal_service_token
    environment:
      OPENAI_API_KEY: ""
      INTERNAL_SERVICE_TOKEN: ""

  tool-proxy:
    secrets:
      - internal_service_token
    environment:
      INTERNAL_SERVICE_TOKEN: ""

  sandbox-runtime:
    secrets:
      - internal_service_token
    environment:
      INTERNAL_SERVICE_TOKEN: ""

  memory-plane:
    secrets:
      - internal_service_token
    environment:
      INTERNAL_SERVICE_TOKEN: ""

  observability-plane:
    secrets:
      - internal_service_token
    environment:
      INTERNAL_SERVICE_TOKEN: ""

  workflow-engine:
    secrets:
      - jwt_secret
      - egaop_master_encryption_key
      - postgres_password
      - openai_api_key
      - internal_service_token
    environment:
      JWT_SECRET: ""
      EGAOP_MASTER_ENCRYPTION_KEY: ""
      POSTGRES_PASSWORD: ""
      OPENAI_API_KEY: ""
      INTERNAL_SERVICE_TOKEN: ""

  secret-store:
    secrets:
      - jwt_secret
      - egaop_master_encryption_key
      - internal_service_token
    environment:
      JWT_SECRET: ""
      EGAOP_MASTER_ENCRYPTION_KEY: ""
      INTERNAL_SERVICE_TOKEN: ""

  policy-plane:
    secrets:
      - jwt_secret
      - internal_service_token
    environment:
      JWT_SECRET: ""
      INTERNAL_SERVICE_TOKEN: ""

  postgres:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD: ""

  grafana:
    secrets:
      - grafana_password
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ""
