{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-observability-plane
  namespace: {{ .Release.Namespace }}
data:
  OBSERVABILITY_PLANE_PORT: "{{ .Values.grpcPort | default 50056 }}"
  OBSERVABILITY_PLANE_HEALTH_PORT: "{{ .Values.healthPort | default 15056 }}"
{{- end }}
