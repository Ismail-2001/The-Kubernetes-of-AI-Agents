{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}-otel-collector
    app.kubernetes.io/part-of: e-gaop
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ports.grpc }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.ports.http }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.ports.prometheus }}
      targetPort: prometheus
      protocol: TCP
      name: prometheus
    - port: {{ .Values.ports.health }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ .Release.Name }}-otel-collector
{{- end }}
