{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.restPort }}
      targetPort: rest
      protocol: TCP
      name: rest
    - port: {{ .Values.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
