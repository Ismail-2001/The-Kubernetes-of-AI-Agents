{{- if .Values.api-server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  replicas: {{ .Values.api-server.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: e-gaop
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.api-server.healthPort }}"
    spec:
      containers:
        - name: api-server
          image: "{{ .Values.api-server.image }}:{{ .Values.api-server.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.api-server.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.api-server.restPort }}
              name: rest
              protocol: TCP
            - containerPort: {{ .Values.api-server.healthPort }}
              name: health
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-e-gaop-shared
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: egaop-api-server
            - name: SERVICE_GRPC_PORT
              value: "{{ .Values.api-server.grpcPort }}"
            - name: SERVICE_REST_PORT
              value: "{{ .Values.api-server.restPort }}"
            - name: SERVICE_HEALTH_PORT
              value: "{{ .Values.api-server.healthPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api-server.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      securityContext:
        fsGroup: 1001
{{- end }}
