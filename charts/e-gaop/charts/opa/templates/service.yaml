{{- if .Values.opa.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: {{ .Release.Name }}-opa
    app.kubernetes.io/part-of: e-gaop
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.opa.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: {{ .Release.Name }}-opa
{{- end }}
