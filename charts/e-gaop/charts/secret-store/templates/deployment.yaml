{{- if .Values.secret-store.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-secret-store
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: secret-store
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  replicas: {{ .Values.secret-store.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-store
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-store
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: e-gaop
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.secret-store.healthPort }}"
    spec:
      containers:
        - name: secret-store
          image: "{{ .Values.secret-store.image }}:{{ .Values.secret-store.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.secret-store.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.secret-store.healthPort }}
              name: health
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-e-gaop-shared
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: egaop-secret-store
            - name: SERVICE_GRPC_PORT
              value: "{{ .Values.secret-store.grpcPort }}"
            - name: SERVICE_HEALTH_PORT
              value: "{{ .Values.secret-store.healthPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.secret-store.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      securityContext:
        fsGroup: 1001
{{- end }}
