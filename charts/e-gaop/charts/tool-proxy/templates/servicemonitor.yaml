{{- if .Values.tool-proxy.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-tool-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: tool-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tool-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: health
      path: /metrics
      interval: 15s
{{- end }}
