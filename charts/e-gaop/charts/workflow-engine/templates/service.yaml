{{- if .Values.workflow-engine.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-workflow-engine
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: workflow-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.workflow-engine.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: workflow-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
