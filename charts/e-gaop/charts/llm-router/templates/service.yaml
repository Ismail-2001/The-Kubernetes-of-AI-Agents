{{- if .Values.llm-router.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-llm-router
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: llm-router
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: e-gaop
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.llm-router.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.llm-router.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: llm-router
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
