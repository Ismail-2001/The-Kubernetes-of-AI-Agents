{{- /*
  Managed secrets fallback.
  When externalSecrets.enabled is false (no Vault/ESO available, e.g. local kind),
  render a Secret directly from values so the application deployments and the
  postgresql/redis charts (which reference e-gaop-managed-secrets) can start.
*/}}
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "e-gaop.fullname" . }}-managed-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "e-gaop.labels" . | nindent 4 }}
type: Opaque
stringData:
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  temporal-tls-cert: {{ .Values.secrets.temporalTlsCert | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
{{- end }}
