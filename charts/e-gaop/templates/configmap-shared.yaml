apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-gaop.fullname" . }}-shared
  namespace: {{ include "e-gaop.namespace" . }}
  labels:
    {{- include "e-gaop.labels" . | nindent 4 }}
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.global.otelEndpoint | quote }}
  LOG_LEVEL: "info"
  TLS_ENABLED: "true"
  POSTGRES_HOST: "postgres-primary"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  REDIS_HOST: "redis-master"
  REDIS_PORT: "6379"
  TEMPORAL_HOST: "temporal-frontend"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: {{ .Values.temporal.namespace | quote }}
