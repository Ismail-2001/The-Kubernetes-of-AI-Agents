{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "e-gaop.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "e-gaop.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.certManagerIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/rate-limit: "{{ .Values.ingress.rateLimit | default 100 }}"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  tls:
    - hosts:
        - {{ .Values.ingress.adminHost | quote }}
        - {{ .Values.ingress.apiHost | quote }}
      secretName: {{ include "e-gaop.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.adminHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-admin-console
                port:
                  number: {{ index .Values "admin-console" "port" | default 3000 }}
    - host: {{ .Values.ingress.apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-api-server
                port:
                  number: {{ index .Values "api-server" "restPort" | default 3001 }}
{{- end }}
