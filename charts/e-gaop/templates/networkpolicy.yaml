---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "e-gaop.fullname" . }}-internal-ca
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "e-gaop.fullname" . }}-mtls-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: e-gaop-internal-ca
  secretName: e-gaop-internal-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ include "e-gaop.fullname" . }}-internal-ca
    kind: ClusterIssuer
