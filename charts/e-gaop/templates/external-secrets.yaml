{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStoreRef
metadata:
  name: {{ include "e-gaop.fullname" . }}-vault
  namespace: {{ include "e-gaop.namespace" . }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vault.address | quote }}
      path: {{ .Values.externalSecrets.vault.path | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.vault.kubernetesMountPath | quote }}
          role: {{ .Values.externalSecrets.vault.kubernetesRole | quote }}
          serviceAccountRef:
            name: {{ include "e-gaop.fullname" . }}-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "e-gaop.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "e-gaop.fullname" . }}-vault
    kind: SecretStore
  target:
    name: {{ include "e-gaop.fullname" . }}-managed-secrets
    creationPolicy: Owner
  data:
    - secretKey: encryption-key
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretsPath }}/encryption-key
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretsPath }}/jwt-secret
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretsPath }}/database-url
    - secretKey: temporal-tls-cert
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretsPath }}/temporal-tls-cert
    - secretKey: openai-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretsPath }}/openai-api-key
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "e-gaop.fullname" . }}-external-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "e-gaop.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "e-gaop.fullname" . }}-external-secrets
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "e-gaop.fullname" . }}-external-secrets
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "e-gaop.fullname" . }}-external-secrets
roleRef:
  kind: Role
  name: {{ include "e-gaop.fullname" . }}-external-secrets
  apiGroup: rbac.authorization.k8s.io
{{- end }}
