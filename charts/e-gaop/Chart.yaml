apiVersion: v2
name: e-gaop
description: Enterprise-Grade Agent Orchestration Platform — Kubernetes of AI Agents
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - ai-agents
  - orchestration
  - grpc
  - temporal
  - observability
maintainers:
  - name: E-GAOP Team
    email: platform@egaop.dev
dependencies:
  # ─── Community Charts (infrastructure) ─────────────────────────────────────
  - name: postgresql
    version: "16.4.1"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.6.2"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: temporal
    version: "0.44.0"
    repository: https://temporalio.github.io/helm-charts
    condition: temporal.enabled
  # ─── Custom Subcharts (application services) ──────────────────────────────
  - name: opa
    version: "0.1.0"
    condition: opa.enabled
  - name: otel-collector
    version: "0.1.0"
    condition: otelCollector.enabled
  - name: api-server
    version: "0.1.0"
  - name: secret-store
    version: "0.1.0"
  - name: workflow-engine
    version: "0.1.0"
  - name: llm-router
    version: "0.1.0"
  - name: tool-proxy
    version: "0.1.0"
  - name: sandbox-runtime
    version: "0.1.0"
  - name: memory-plane
    version: "0.1.0"
  - name: observability-plane
    version: "0.1.0"
  - name: admin-console
    version: "0.1.0"
