# =============================================================================
# E-GAOP Helm Values — Default (Development)
# =============================================================================
# ⚠️  No secrets in this file — use External Secrets Operator for all secrets
# =============================================================================

global:
  imageRegistry: ghcr.io
  imagePullSecrets: []
  storageClass: ""
  # otel-collector service is named <release>-otel-collector (see otel-collector chart)
  otelEndpoint: "http://egaop-test-otel-collector:4317"
  # ServiceMonitors require prometheus-operator CRDs; disable for kind smoke tests
  serviceMonitorEnabled: false
  # bitnami charts now require this when images come from non-docker.io registries
  security:
    allowInsecureImages: true

# ─── TLS / cert-manager ─────────────────────────────────────────────────────
# Requires cert-manager CRDs installed in the cluster. Disabled for local kind.
tls:
  certManager:
    enabled: false

# ─── External Secrets Operator ──────────────────────────────────────────────
# Disabled by default for local kind deploys (no Vault/ESO). When disabled,
# templates/secrets.yaml renders a managed Secret directly from .Values.secrets.
externalSecrets:
  enabled: false
  vault:
    address: "http://vault:8200"
    path: "secret/data/egaop"
    kubernetesMountPath: "kubernetes"
    kubernetesRole: "egaop"
    secretsPath: "secret/data/egaop"

# ─── Managed secrets (used when externalSecrets.enabled=false) ──────────────
# For real deployments use External Secrets Operator + Vault instead.
secrets:
  encryptionKey: "dev-encryption-key-change-me-0000000000000000"
  jwtSecret: "dev-jwt-secret-change-me-00000000000000000000"
  databaseUrl: "postgres://egaop:dev-postgres-password@egaop-test-postgresql:5432/egaop"
  redisPassword: "dev-redis-password"
  temporalTlsCert: ""
  openaiApiKey: "sk-dev-openai-placeholder"

# ─── Ingress ────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  adminHost: admin.egaop.dev
  apiHost: api.egaop.dev
  certManagerIssuer: letsencrypt-prod
  rateLimit: "100"

# ─── Community Charts (infrastructure) ──────────────────────────────────────
# NOTE: existingSecret must match the Secret rendered by templates/secrets.yaml
# (name = <release>-e-gaop-managed-secrets). Keys below must match that Secret.
postgresql:
  enabled: true
  auth:
    username: egaop
    password: "dev-postgres-password"
    database: egaop
    existingSecret: "egaop-test-e-gaop-managed-secrets"
    secretKeys:
      adminPasswordKey: database-url
      userPasswordKey: database-url
  primary:
    persistence:
      size: 10Gi
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  metrics:
    enabled: true

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: "dev-redis-password"
    existingSecret: "egaop-test-e-gaop-managed-secrets"
    existingPasswordKey: redis-password
  master:
    persistence:
      size: 5Gi
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  metrics:
    enabled: true

temporal:
  enabled: true
  namespace: egaop
  server:
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  admintools:
    enabled: false

# ─── OPA + OTel (custom subcharts) ─────────────────────────────────────────
# NOTE: values here are merged into the subchart scope. The subcharts expect
# `image` as a {repository,tag,pullPolicy} map and `ports` as a map, so the
# parent override must match that shape (a bare string would break templates).
opa:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: "0.68.0"
    pullPolicy: IfNotPresent
  port: 8181

otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: latest
    pullPolicy: IfNotPresent
  ports:
    grpc: 4317
    http: 4318
    prometheus: 8889
    health: 13133

# ─── Service Defaults ───────────────────────────────────────────────────────
defaults:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

# ─── Service Overrides ──────────────────────────────────────────────────────
api-server:
  enabled: true
  image: egaop/api-server
  tag: latest
  replicas: 1
  grpcPort: 50051
  healthPort: 15051
  restPort: 3001
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

secret-store:
  enabled: true
  image: egaop/secret-store
  tag: latest
  replicas: 1
  grpcPort: 50057
  healthPort: 15057

workflow-engine:
  enabled: true
  image: egaop/workflow-engine
  tag: latest
  replicas: 1
  healthPort: 15058
  temporalNamespace: default
  taskQueue: egaop-agent-queue

llm-router:
  enabled: true
  image: egaop/llm-router
  tag: latest
  replicas: 1
  grpcPort: 50053
  healthPort: 15053
  rateLimitRpm: 30

tool-proxy:
  enabled: true
  image: egaop/tool-proxy
  tag: latest
  replicas: 1
  grpcPort: 50052
  healthPort: 15052
  rateLimitRpm: 60

sandbox-runtime:
  enabled: true
  image: egaop/sandbox-runtime
  tag: latest
  replicas: 1
  grpcPort: 50054
  healthPort: 15054

memory-plane:
  enabled: true
  image: egaop/memory-plane
  tag: latest
  replicas: 1
  grpcPort: 50055
  healthPort: 15055

observability-plane:
  enabled: true
  image: egaop/observability-plane
  tag: latest
  replicas: 1
  grpcPort: 50056
  healthPort: 15056

admin-console:
  enabled: true
  image: egaop/admin-console
  tag: latest
  replicas: 1
  port: 3000
