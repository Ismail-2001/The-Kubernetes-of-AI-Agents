version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: "production"
      dev-deps:
        dependency-type: "development"

  - package-ecosystem: "docker"
    directory: "/control-plane/api-server"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/control-plane/secret-store"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/control-plane/workflow-engine"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/execution-plane/llm-router"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/execution-plane/tool-proxy"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/execution-plane/sandbox-runtime"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/memory-plane"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/observability-plane"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/admin-console"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
