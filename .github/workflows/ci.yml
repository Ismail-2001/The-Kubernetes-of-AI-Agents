name: CI
run-name: "CI ${{ github.ref_name }} — ${{ github.sha }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  #############################################################################
  # PREFLIGHT — fast checks that can fail early
  #############################################################################
  audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --prefer-offline --no-fund
      - run: npm audit --audit-level=high
      - name: Check for .env.example drift
        run: |
          if [ -f .env.example ]; then
            diff <(sort .env.example) <(git ls-files '*.env.example' | xargs sort 2>/dev/null) || true
            echo "ℹ .env.example exists — verify it stays in sync with .env"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --prefer-offline --no-fund
      - run: npm run lint --workspaces --if-present

  typecheck:
    name: Type Check
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --prefer-offline --no-fund
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspaces --if-present

  helm-lint:
    name: Helm Chart
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Helm dependency update
        run: helm dependency update charts/e-gaop
      - name: Helm lint
        run: helm lint charts/e-gaop --strict
      - name: Helm template (all values)
        run: helm template test charts/e-gaop --values charts/e-gaop/values.yaml > /dev/null
      - name: Helm template (CI overrides)
        run: |
          helm template test charts/e-gaop \
            --values charts/e-gaop/values.yaml \
            --set opa.image.tag=0.68.0 \
            --set global.environment=ci > /dev/null

  #############################################################################
  # TESTS
  #############################################################################
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --prefer-offline --no-fund
      - run: npm run build --workspace=packages/shared
      - run: npm test --workspaces --if-present -- --passWithNoTests
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/junit.xml
            **/test-results.json
          retention-days: 14

  test-cross-cutting:
    name: Cross-Cutting Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: egaop
          POSTGRES_PASSWORD: egaop-test
          POSTGRES_DB: egaop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: egaop
      POSTGRES_PASSWORD: egaop-test
      POSTGRES_DB: egaop_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --prefer-offline --no-fund
      - run: npm run build --workspace=packages/shared
      - name: Run contract tests
        run: npx jest --config tests/jest.config.js --selectProjects contract --passWithNoTests
      - name: Run chaos tests
        run: npx jest --config tests/jest.config.js --selectProjects chaos --passWithNoTests
      - name: Run security tests
        run: npx jest --config tests/jest.config.js --selectProjects security --passWithNoTests

  #############################################################################
  # BUILD — Docker images (parallel matrix)
  #############################################################################
  docker-build:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [test-unit, test-cross-cutting, helm-lint]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-server
          - secret-store
          - workflow-engine
          - llm-router
          - tool-proxy
          - sandbox-runtime
          - memory-plane
          - observability-plane
          - admin-console
    steps:
      - uses: actions/checkout@v4
      - name: Map Dockerfile path
        id: paths
        run: |
          case "${{ matrix.service }}" in
            api-server)       echo "df=control-plane/api-server/Dockerfile" ;;
            secret-store)     echo "df=control-plane/secret-store/Dockerfile" ;;
            workflow-engine)  echo "df=control-plane/workflow-engine/Dockerfile" ;;
            llm-router)       echo "df=execution-plane/llm-router/Dockerfile" ;;
            tool-proxy)       echo "df=execution-plane/tool-proxy/Dockerfile" ;;
            sandbox-runtime)  echo "df=execution-plane/sandbox-runtime/Dockerfile" ;;
            memory-plane)     echo "df=memory-plane/Dockerfile" ;;
            observability-plane) echo "df=observability-plane/Dockerfile" ;;
            admin-console)    echo "df=admin-console/Dockerfile" ;;
          esac >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.paths.outputs.df }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  docker-compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          for f in compose.yaml compose.yml docker-compose.yml docker-compose.yaml; do
            if [ -f "$f" ]; then
              echo "Validating $f..."
              docker compose -f "$f" config > /dev/null
            fi
          done

  #############################################################################
  # SUMMARY
  #############################################################################
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    if: always()
    needs: [audit, lint, typecheck, helm-lint, test-unit, test-cross-cutting, docker-build, docker-compose-validate]
    steps:
      - run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Audit | ${{ needs.audit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ needs.typecheck.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Lint | ${{ needs.helm-lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-Cutting | ${{ needs.test-cross-cutting.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Images | ${{ needs.docker-build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compose Validate | ${{ needs.docker-compose-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
