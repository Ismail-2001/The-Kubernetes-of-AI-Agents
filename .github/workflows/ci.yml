name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --workspaces --if-present

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspaces --if-present

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm test --workspaces --if-present -- --passWithNoTests

  test-cross-cutting:
    name: Cross-Cutting Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, audit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: egaop
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: egaop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: egaop
      POSTGRES_PASSWORD: test-password
      POSTGRES_DB: egaop
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Run contract tests
        run: npx jest --config tests/jest.config.js --selectProjects contract --passWithNoTests
      - name: Run chaos tests
        run: npx jest --config tests/jest.config.js --selectProjects chaos --passWithNoTests
      - name: Run security tests
        run: npx jest --config tests/jest.config.js --selectProjects security --passWithNoTests

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-unit, test-cross-cutting]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all images
        run: docker compose build --no-cache
