name: Deploy
run-name: "Deploy ${{ github.event.workflow_run.head_branch || github.ref_name }} — ${{ github.event.workflow_run.head_sha || github.sha }}"

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  #############################################################################
  # GATE — only proceed if CI passed
  #############################################################################
  check-ci-status:
    name: Verify CI Success
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      ci_passed: ${{ steps.check.outputs.ci_passed }}
    steps:
      - name: Check CI workflow conclusion
        id: check
        env:
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "$CI_CONCLUSION" = "success" ]; then
            echo "ci_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_passed=false" >> "$GITHUB_OUTPUT"
          fi

  #############################################################################
  # DEPLOY STAGING
  #############################################################################
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: [check-ci-status]
    if: needs.check-ci-status.outputs.ci_passed == 'true'
    environment: staging
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.passed }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        if: ${{ secrets.STAGING_HOST != '' }}
        uses: webfactory/ssh-agent@v0.9
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Configure Docker context
        if: ${{ secrets.STAGING_HOST != '' }}
        run: |
          docker context create staging \
            --docker "host=ssh://${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}"
          docker context use staging

      - name: Write .env (non-secrets only)
        run: |
          cat > .env <<EOF
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          REGISTRY=${{ env.REGISTRY }}
          LOG_LEVEL=debug
          NODE_ENV=staging
          POSTGRES_USER=egaop
          POSTGRES_DB=egaop
          EOF

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Run database migrations
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EGAOP_MASTER_ENCRYPTION_KEY: ${{ secrets.EGAOP_MASTER_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: docker compose run --rm migrate up

      - name: Pull images
        run: docker compose pull --quiet

      - name: Deploy
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EGAOP_MASTER_ENCRYPTION_KEY: ${{ secrets.EGAOP_MASTER_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: docker compose up -d --wait --wait-timeout 120 --remove-orphans

      - name: Health check poll
        run: |
          echo "Polling API health endpoint..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${STAGING_HOST:-localhost}:15051/healthz" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "API server is healthy (attempt $i)"
              break
            fi
            echo "Waiting... (attempt $i, HTTP $status)"
            sleep 5
          done
          if [ "$status" != "200" ]; then
            echo "API server failed to become healthy"
            exit 1
          fi

      - name: Run smoke tests
        id: smoke
        run: |
          base="${STAGING_HOST:-localhost}"
          if bash scripts/smoke-test.sh "$base"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag successful deploy
        if: steps.smoke.outputs.passed == 'true'
        run: |
          echo "LAST_SUCCESSFUL_DEPLOY_TAG=${{ env.IMAGE_TAG }}" >> "$GITHUB_ENV"

      - name: Update deploy tag variable
        if: steps.smoke.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.actions.createOrUpdateRepoVariable({
              owner, repo,
              name: 'LAST_SUCCESSFUL_DEPLOY_TAG',
              value: process.env.IMAGE_TAG,
            });

      - name: Rollback on failure
        if: steps.smoke.outputs.passed == 'false' && vars.LAST_SUCCESSFUL_DEPLOY_TAG != ''
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EGAOP_MASTER_ENCRYPTION_KEY: ${{ secrets.EGAOP_MASTER_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          echo "Smoke tests failed. Rolling back to ${{ vars.LAST_SUCCESSFUL_DEPLOY_TAG }}..."
          export IMAGE_TAG="${{ vars.LAST_SUCCESSFUL_DEPLOY_TAG }}"
          cat > .env <<EOF
          IMAGE_TAG=${{ vars.LAST_SUCCESSFUL_DEPLOY_TAG }}
          REGISTRY=${{ env.REGISTRY }}
          LOG_LEVEL=debug
          NODE_ENV=staging
          POSTGRES_USER=egaop
          POSTGRES_DB=egaop
          EOF
          docker compose pull --quiet
          docker compose up -d --wait --wait-timeout 120 --remove-orphans
          bash scripts/rollback.sh "$SLACK_WEBHOOK" "${{ vars.LAST_SUCCESSFUL_DEPLOY_TAG }}"

  #############################################################################
  # PROMOTE TO PRODUCTION (manual approval)
  #############################################################################
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: [deploy-staging]
    if: needs.deploy-staging.outputs.smoke_passed == 'true'
    environment:
      name: production
      url: https://app.egaop.io
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Configure Docker context
        run: |
          docker context create production \
            --docker "host=ssh://${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}"
          docker context use production

      - name: Login to Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Write .env (non-secrets only)
        run: |
          cat > .env <<EOF
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          REGISTRY=${{ env.REGISTRY }}
          LOG_LEVEL=info
          NODE_ENV=production
          POSTGRES_USER=egaop
          POSTGRES_DB=egaop
          EOF

      - name: Run database migrations
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EGAOP_MASTER_ENCRYPTION_KEY: ${{ secrets.EGAOP_MASTER_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: docker compose run --rm migrate up

      - name: Pull images
        run: docker compose pull --quiet

      - name: Deploy
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EGAOP_MASTER_ENCRYPTION_KEY: ${{ secrets.EGAOP_MASTER_ENCRYPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: docker compose up -d --wait --wait-timeout 180 --remove-orphans

      - name: Health check poll
        run: |
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.egaop.io/healthz" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Production API is healthy (attempt $i)"
              break
            fi
            echo "Waiting... (attempt $i, HTTP $status)"
            sleep 10
          done
          if [ "$status" != "200" ]; then
            echo "Production API failed to become healthy"
            exit 1
          fi

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ secrets.PRODUCTION_HOST }}"

      - name: Notify success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST -H "Content-Type: application/json" \
              -d '{"text":"Production deploy complete: `'${{ env.IMAGE_TAG }}'`"}' \
              "$SLACK_WEBHOOK" > /dev/null 2>&1 || true
          fi
